<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard Pro - Certificate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="certificate-page">
  <div class="certificate-box">
    <h1>🏆 Certificate of Completion</h1>
    <p>This certificate is proudly presented to</p>
    <h2 id="certificateName">Student</h2>
    <p>for successfully completing the Flashcard Pro learning program.</p>
    <p class="cert-score" id="certificateScore"></p>

    <div class="cert-actions">
      <button onclick="window.print()" class="primary-btn">Download / Print</button>
      <a href="dashboard.html" class="secondary-link">Back to Dashboard</a>
    </div>
  </div>

  <script src="certificate.js"></script>
</body>
</html>
